name: Build and Push Dev Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'docker/.docker-image'
      - 'platformio.ini'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read image tag from .docker-image
        id: image
        run: |
          IMAGE=$(head -1 docker/.docker-image | tr -d '\n\r')
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Image: ${IMAGE}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Pre-download PlatformIO toolchains on runner ──
      # These get injected into the Docker build via --build-context,
      # avoiding unreliable PlatformIO CDN downloads inside Docker.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-toolchains-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO & download toolchains
        run: |
          pip install platformio
          pio platform install espressif32
          pio platform install native
          # Trigger ESP32-S3 build to download compiler + framework (~1.5GB)
          pio run -e esp32-s3-devkitc-1

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-contexts: |
            pio-cache=/home/runner/.platformio
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
