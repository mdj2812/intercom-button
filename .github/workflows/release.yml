name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32-s3-devkitc-1

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp .pio/build/esp32-s3-devkitc-1/firmware.bin release/intercom-button-${{ github.ref_name }}.bin
          pio run -e esp32-s3-devkitc-1 -t size | tee release/size.txt

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            release/intercom-button-${{ github.ref_name }}.bin
            release/size.txt
