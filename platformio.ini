[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ── Flash & PSRAM ───────────────────────────────────
board_build.flash_mode = dio
board_build.psram_type = opi
board_upload.flash_size = 8MB

; ── LittleFS for runtime config ─────────────────────
board_build.partitions = partitions_ota_8MB.csv
board_build.filesystem = littlefs

; ── USB ─────────────────────────────────────────────
upload_protocol = esptool
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; ── Static analysis ─────────────────────────────────
check_tool = cppcheck

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    bblanchon/ArduinoJson @ ^6.21.0

# ── Native test environment (no ESP32 needed) ────────
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++20
    -O0
    -g
    --coverage
    -Itest/mocks
    -DARDUINOJSON_ENABLE_ARDUINO_STRING
    -DUNIT_TEST
build_unflags = -Os
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.0
build_src_filter =
    +<*>
    -<main.cpp>
    -<audio_recorder.cpp>
    -<ota_manager.cpp>   ; needs WiFi, HTTPClient, Update (ESP-only)
    -<ota_crypto.cpp>    ; uses mbedtls v2 API (ESP32) — tested via test_ota_crypto.cpp with system mbedtls
test_build_src = yes
extra_scripts = extra_script.py
