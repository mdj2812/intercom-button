name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'platformio.ini'
      - 'docker/Dockerfile'
      - 'docker/.docker-image'
      - '.gitea/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'platformio.ini'
      - '.gitea/workflows/ci.yml'

jobs:
  # ── Firmware Build ────────────────────────────────
  build:
    runs-on: check
    container:
      image: registry.home.mdj2812.top/esp32-pio-builder:v1.0.6
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        run: pio run -e esp32-s3-devkitc-1
      - name: Show binary size
        run: pio run -e esp32-s3-devkitc-1 -t size

  # ── Static Analysis ────────────────────────────────
  check:
    runs-on: check
    container:
      image: registry.home.mdj2812.top/esp32-pio-builder:v1.0.6
    steps:
      - uses: actions/checkout@v4
      - name: PlatformIO check (cppcheck)
        run: pio check -e esp32-s3-devkitc-1 --fail-on-defect=high --skip-packages 2>&1 || true

  # ── Unit Tests (native, no hardware needed) ────────
  test:
    runs-on: check
    container:
      image: registry.home.mdj2812.top/esp32-pio-builder:v1.0.6
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: pio test -e native -v
