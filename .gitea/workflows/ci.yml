name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'platformio.ini'
      - 'docker/Dockerfile'
      - 'docker/.docker-image'
      - '.gitea/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'platformio.ini'
      - '.gitea/workflows/ci.yml'

jobs:
  # ── Firmware Build ────────────────────────────────
  build:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        run: pio run
      - name: Show binary size
        run: pio run -t size

  # ── Static Analysis ────────────────────────────────
  check:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: PlatformIO check (cppcheck + clang-tidy)
        run: pio check --fail-on-defect=high --skip-packages 2>&1 || true
        # `|| true` until we fix all existing warnings

  # ── Unit Tests (native, no hardware needed) ────────
  test:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: pio test -e native -v
