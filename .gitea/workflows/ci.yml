name: CI

on:
  push:
    branches: [main]
    paths:
      - 'Makefile'
      - 'src/**'
      - 'test/**'
      - 'platformio.ini'
      - 'extra_script.py'
      - '.clang-format'
      - 'docker/Dockerfile'
      - 'docker/.docker-image'
      - 'docker/dev.sh'
      - '.gitea/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Makefile'
      - 'src/**'
      - 'test/**'
      - 'platformio.ini'
      - 'extra_script.py'
      - '.clang-format'
      - '.gitea/workflows/ci.yml'

jobs:
  # ── Firmware Build ────────────────────────────────
  build:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        run: ./docker/dev.sh pio run -e esp32-s3-devkitc-1
      - name: Show binary size
        run: ./docker/dev.sh pio run -e esp32-s3-devkitc-1 -t size

  # ── Static Analysis ────────────────────────────────
  check:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: PlatformIO check (cppcheck)
        run: ./docker/dev.sh pio check -e esp32-s3-devkitc-1 --fail-on-defect=high --skip-packages 2>&1 || true

  # ── Code Format ────────────────────────────────────
  format:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: Check code formatting
        run: clang-format --dry-run -Werror src/*.cpp src/*.h $(find test -name '*.cpp')

  # ── Unit Tests (native, no hardware needed) ────────
  test:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: ./docker/dev.sh pio test -e native -v

  # ── Code Coverage (native tests) ───────────────────
  coverage:
    runs-on: check
    steps:
      - uses: actions/checkout@v4
      - name: Build & run tests with coverage
        run: ./docker/dev.sh make test-coverage
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
